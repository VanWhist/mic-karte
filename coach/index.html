<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MIC選手カルテ</title>
<style>
  :root {
    --surface-1: #ffffff;
    --page: #f4f5f7;
    --text-primary: #0b0b0b;
    --text-secondary: #55575c;
    --text-muted: #8a8d93;
    --gridline: #e7e8ec;
    --border: rgba(11,11,11,0.08);
    --blue-450: #2a78d6;
    --blue-250: #86b6ef;
    --blue-350: #5598e7;
    --blue-550: #1c5cab;
    --blue-650: #104281;
    --accent-soft: #eaf2fc;
    --gold-soft: #fbf3df;
    --gold-line: #d79b00;
    --gold-text: #8a6400;
    --green-soft: #eaf7ef;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--page);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  /* App chrome */
  .app-header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    padding: calc(var(--safe-top) + 10px) 16px 10px;
    border-bottom: 1px solid var(--gridline);
  }
  .app-title {
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    margin: 0 0 10px;
    letter-spacing: 0.01em;
  }
  .segmented {
    display: flex;
    background: var(--page);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }
  .segmented button {
    flex: 1;
    border: none;
    background: transparent;
    padding: 8px 6px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    border-radius: 8px;
    font-family: inherit;
  }
  .segmented button.active {
    background: var(--surface-1);
    color: var(--text-primary);
    box-shadow: 0 1px 3px rgba(11,11,11,0.12);
  }
  .updated-row {
    display: flex;
    justify-content: center;
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--text-muted);
  }

  .app-body {
    padding: 12px 12px calc(var(--safe-bottom) + 28px);
    max-width: 480px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface-1);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(11,11,11,0.05);
    border: 1px solid var(--border);
  }
  .card-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px 8px;
  }
  .card-head .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--blue-450);
    flex: none;
  }
  .card-head.gold .dot { background: var(--gold-line); }
  .card-head.green .dot { background: #1f9d55; }
  .card-head h2 {
    font-size: 13.5px;
    font-weight: 700;
    margin: 0;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }
  .card-body { padding: 0 14px 14px; }

  .field { padding: 8px 0; border-top: 1px solid var(--gridline); }
  .field:first-child { border-top: none; padding-top: 0; }
  .field .k { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .field .v { font-size: 14px; line-height: 1.55; color: var(--text-primary); }
  .field.clickable { cursor: pointer; transition: opacity 0.08s ease; }
  .field.clickable:active { opacity: 0.6; }
  .field .chev { font-size: 10px; color: var(--text-muted); font-weight: 400; }
  .field .chev { font-size: 17px; color: var(--blue-450); font-weight: 700; opacity: 0.7; vertical-align: -2px; }
  .field.sub {
    background: var(--gold-soft);
    border-top: none;
    border-radius: 8px;
    padding: 9px 10px;
    margin: 2px 0 4px;
  }
  .field.sub .k { color: var(--gold-text); }

  .goal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .goal-tile {
    background: var(--accent-soft);
    border-radius: 10px;
    padding: 9px 10px;
  }
  .goal-tile .k { font-size: 10.5px; color: var(--blue-450); font-weight: 700; margin-bottom: 3px; }
  .goal-tile .v { font-size: 12.5px; line-height: 1.5; color: var(--text-primary); }
  .goal-tile.clickable { cursor: pointer; transition: transform 0.08s ease; }
  .goal-tile.clickable:active { transform: scale(0.97); }
  .goal-tile.clickable { position: relative; padding-right: 30px; }
  .goal-tile.clickable::after {
    content: "\203A";
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 24px;
    font-weight: 700;
    color: var(--blue-450);
    opacity: 0.6;
  }
  .goal-tile.muted { background: var(--page); opacity: 0.7; }

  /* self-assessment bars */
  .bars { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: grid; grid-template-columns: 96px 1fr; align-items: center; gap: 8px; }
  .bar-row .name { font-size: 11px; color: var(--text-secondary); text-align: right; white-space: nowrap; }
  .bar-track { position: relative; height: 16px; background: var(--page); border-radius: 4px; }
  .bar-fill { position: absolute; left: 0; top: 0; height: 16px; border-radius: 4px; display: flex; align-items: center; }
  .bar-fill span { color: #fff; font-size: 10px; font-weight: 700; margin-left: auto; margin-right: 5px; }
  .bar-row .val { font-size: 11.5px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .focus-chip {
    display: inline-block;
    font-size: 9.5px;
    background: var(--gold-soft);
    color: var(--gold-text);
    border: 1px solid var(--gold-line);
    border-radius: 999px;
    padding: 1px 6px;
    margin-left: 4px;
  }
  .focus-note { font-size: 11px; color: var(--text-muted); margin-top: 10px; }

  .life-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .life-tile { background: var(--page); border-radius: 10px; padding: 8px 4px; text-align: center; }
  .life-tile .k { font-size: 9.5px; color: var(--text-muted); margin-bottom: 3px; }
  .life-tile .v { font-size: 12px; font-weight: 700; }

  .message-box {
    background: var(--gold-soft);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.6;
    margin-top: 10px;
  }
  .message-box .k { font-size: 10.5px; color: var(--gold-text); font-weight: 700; margin-bottom: 4px; }

  .coachnote-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .coachnote-item { padding: 8px 10px; border-radius: 8px; background: var(--page); border: 1px solid var(--gridline); }
  .coachnote-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .coachnote-text { font-size: 13px; color: var(--text-primary); white-space: pre-wrap; }
  .coachnote-input { width: 100%; box-sizing: border-box; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: inherit; resize: vertical; margin-bottom: 6px; }
  .coachnote-btn { border: none; background: var(--blue-450); color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .coachnote-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .coachnote-status { font-size: 11px; color: var(--text-muted); margin-top: 6px; min-height: 14px; }

  .coachnote-thread { border: 1px solid var(--gridline); border-radius: 10px; padding: 10px; margin-bottom: 10px; background: #fff; }
  .coachnote-thread-header { font-size: 12px; color: var(--text-primary); font-weight: 700; margin-bottom: 2px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
  .coachnote-thread-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .coachnote-best-badge { font-size: 10.5px; color: var(--gold-text); background: var(--gold-soft); border: 1px solid var(--gold-line); border-radius: 10px; padding: 1px 8px; font-weight: 700; }
  .coachnote-video-links { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .coachnote-video-link { font-size: 11px; color: var(--blue-450); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; text-decoration: none; }
  .coachnote-bubbles { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .coachnote-bubble { max-width: 88%; border-radius: 10px; padding: 6px 10px; font-size: 12.5px; }
  .coachnote-bubble.athlete { align-self: flex-start; background: #eaf1fb; border: 1px solid rgba(42,120,214,0.2); }
  .coachnote-bubble.coach { align-self: flex-end; background: var(--gold-soft); border: 1px solid var(--gold-line); }
  .coachnote-bubble .who { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
  .coachnote-bubble .txt { white-space: pre-wrap; color: var(--text-primary); }
  .coachnote-reply-row { display: flex; gap: 6px; align-items: flex-start; }
  .coachnote-reply-input { flex: 1; box-sizing: border-box; border: 1px solid var(--border); border-radius: 8px; padding: 6px 9px; font-size: 12.5px; font-family: inherit; resize: vertical; min-height: 32px; }
  .coachnote-reply-btn { border: none; background: var(--blue-450); color: #fff; padding: 7px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .coachnote-reply-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .coachnote-general-heading { font-size: 11.5px; color: var(--text-muted); font-weight: 700; margin: 4px 0 6px; }

  .mandala-3x3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .mandala-cell {
    border-radius: 10px;
    padding: 8px 4px;
    text-align: center;
    min-height: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .mandala-cell.center {
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
  }
  .mandala-cell.center .g {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--gold-text);
    line-height: 1.4;
  }
  .mandala-cell.elem {
    background: var(--page);
    opacity: 0.7;
  }
  .mandala-cell.elem.started {
    background: var(--accent-soft);
    border: 1px solid var(--blue-250);
    opacity: 1;
  }
  .mandala-cell.elem .n {
    font-size: 11px;
    font-weight: 700;
    color: var(--blue-550);
    margin-bottom: 2px;
    line-height: 1.3;
  }
  .mandala-cell.elem .p {
    font-size: 9px;
    color: var(--text-muted);
  }
  .mandala-cell.elem.started .p { color: var(--blue-450); font-weight: 700; }
  .mandala-cell.clickable { cursor: pointer; transition: transform 0.08s ease; }
  .mandala-cell.clickable:active { transform: scale(0.95); }
  .mandala-cell.clickable { position: relative; }
  .mandala-cell.elem.clickable::after {
    content: "\203A";
    position: absolute;
    top: 0px;
    right: 3px;
    font-size: 16px;
    font-weight: 700;
    color: var(--blue-450);
    opacity: 0.6;
  }
  .mandala-cell.center.sub {
    background: var(--accent-soft);
    border: 1px solid var(--blue-350);
  }
  .mandala-cell.center.sub .g { color: var(--blue-550); }
  .mandala-cell.action {
    background: var(--page);
    padding: 6px 4px;
  }
  .mandala-cell.action.filled {
    background: var(--surface-1);
    border: 1px solid var(--gridline);
  }
  .mandala-cell.action .a {
    font-size: 9.5px;
    line-height: 1.35;
    color: var(--text-primary);
  }
  .mandala-cell.action .a.muted {
    color: var(--text-muted);
    font-style: italic;
  }
  .mandala-summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .mandala-link {
    color: var(--blue-450);
    font-weight: 700;
    text-decoration: none;
  }
  .mandala-empty {
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.6;
    padding: 4px 2px 10px;
  }

  .draft-banner {
    max-width: 480px;
    margin: 10px auto 0;
    padding: 10px 14px;
    background: #fff8e6;
    border: 1px solid #f0d488;
    border-radius: 10px;
    font-size: 11.5px;
    color: #8a6400;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="app-header">
  <p class="app-title">MIC選手カルテ</p>
  <div class="segmented" id="selector"></div>
  <div class="updated-row" id="updatedRow"></div>
</div>

<div class="app-body" id="appBody"></div>

<div class="draft-banner" id="draftBanner">
  これはドラフト版です。「ウエイトトレーニング」「短期目標（〜7月末）」「将来ビジョン」「今年のシーズン目標」「自己分析」「生活習慣・サポート」「マンダラチャート」はすべてApps Script経由でスプレッドシート/フォームの回答からライブに取得しています。スプレッドシートを更新すると、次回表示時に自動的に反映されます。「MICエアlog」カードはMICエアlogアプリの記録をライブ取得して表示し、公開用カルテ(GitHub Pages)にも反映済みです(セッション/技ごとの本数・成功数・10本ジャンプ滞空秒に対応)。
</div>

<script>
// ==== Phase 3(2026/07/22): URLトークン + 名簿リゾルバAPI経由の動的取得方式 ====
// 以前はここに選手ごとの静的なATHLETESオブジェクト(氏名・各種APIトークンをハードコード)が
// あったが、選手が増えるたびに手動でブロックを追記する必要があり運用が破綻するため廃止した。
// 現在は起動時にinitApp()が「名簿リゾルバAPI」(MIC名簿スプレッドシート連動のApps Script Web App)
// に問い合わせ、結果からATHLETESを動的に組み立てる。
//   - URLに ?token=<選手のカルテトークン> が付いている場合: その選手1名分のみのATHLETESを作り、
//     選手切り替えタブを隠す(選手専用カルテと同じ見え方)。全選手共通シート(シーズンシート/
//     フォームAシート)へのリンクはこのモードでは出さない(8-3の教訓通り)。
//   - トークンが無い場合(コーチ用アプリとしてのアクセス、例: /coach/): 在籍中の全選手を
//     まとめて取得し、従来通り選手切り替えタブ付きで全員分を表示する。
//   - トークンが指定されていて、それがコーチ用トークンとして解決された場合も同様に全選手表示に
//     フォールバックする(将来コーチごとの個別URLを使う場合の下地。今は未使用)。
const RESOLVER_URL = "https://script.google.com/macros/s/AKfycbyYoTaQErII9Br79BNErORlL3ewacb9h3PPW3Vof6XTF43mtDayCkCY3Gbn_Whk_1ZblA/exec";
const SEASON_API_URL = "https://script.google.com/macros/s/AKfycbwMiFwmaf-Y0s7Jsu5kSwljHdxKQ4RXj7BVVVjlgNGSQScSMFtKhOMuP_mtNa597TlcMg/exec";
const SEASON_SHEET_URL = "https://docs.google.com/spreadsheets/d/1SQR5Ct28nohCyOpDWKvJjm8c91esoa5dgxhoB5D4FHA/edit";
const STG_API_URL = "https://script.google.com/macros/s/AKfycbx0QMlnk7dC1nJxV0Et-fqSh--Vo06nOchEOZGYVPp-ODE_tmt6BlRLn3pdt_kUxUVU/exec";
const STG_FORM_URL = "https://forms.gle/t8SKiK1soGFctgyf6";
const STG_SHEET_URL = "https://docs.google.com/spreadsheets/d/1LaYW7XDurwSUDFplH9uwcqUTx_u5OsRt3tPeSjKKA_E/edit";
const MANDALA_API_URL = "https://script.google.com/macros/s/AKfycbxzrgZf1C3vqfGwbeS3hUr1P9U3txbuVfiRBvxWzlAeKdnfIp7QaJ0C1MhE-drLwk31/exec";
const AIRLOG_API_URL = "https://script.google.com/macros/s/AKfycbyH7nX_nhgJ4z7W_QCLGnZqwLp8GkCdRzof2RaaR3fLK2gKVpeF8P0lATS2uzzKJhP0ag/exec";
const AIRLOG_APP_URL = "https://vanwhist.github.io/mic-air-log/";
// 濵田匠真専用のウエイトトレーニングログアプリ(まだ全選手共通化されておらず、名簿リゾルバの
// 管理対象外の一時的な例外。matchNameで引く。他の選手にトレーニングログアプリができたら
// ここに追記する)。
const TRAINING_APPS = {
  "濵田匠真": {
    apiUrl: "https://script.google.com/macros/s/AKfycbzNQbTzvuRuMN2tbMl6LNlnrJ7yinCRSMlsO6EX4YZROA2H-3Wli4XK1wRJFkJKEj5Klg/exec",
    appUrl: "https://vanwhist.github.io/shoma-training-log/"
  }
};

let ATHLETES = {};
// "player": トークンが選手本人に解決された(選手専用モード) / "coach": それ以外(コーチ用・全選手表示)。
// コーチへ共有スレッドへの返信を誰(選手 or コーチ)として送信するかの判定に使う。
var VIEW_MODE = "coach";

// 名簿リゾルバAPIが返す1名分のデータ(person)から、既存の描画ロジックがそのまま使える
// ATHLETESエントリ形式を組み立てる。showSharedSheetUrlsがtrueの場合のみ、全選手共通の
// シーズンシート/フォームAシートへのリンクを含める(コーチ用アプリのみ。選手専用アクセスでは
// 8-3の教訓通り出さない)。トークンが無い項目(名簿登録のみでバックエンド未整備の選手)は
// nullにして、既存の「まだ回答がありません」等の空状態表示にそのまま乗せる。
function buildAthleteEntry(person, showSharedSheetUrls) {
  return {
    updated: null,
    vision: null,
    season: null,
    selfAssessment: null,
    life: null,
    support: null,
    message: null,
    seasonApi: person.seasonApiToken ? {
      apiUrl: SEASON_API_URL,
      token: person.seasonApiToken,
      sheetUrl: showSharedSheetUrls ? SEASON_SHEET_URL : null
    } : null,
    training: TRAINING_APPS[person.matchName] || null,
    shortTermGoal: person.stgApiToken ? {
      apiUrl: STG_API_URL,
      token: person.stgApiToken,
      updated: null,
      formUrl: STG_FORM_URL,
      sheetUrl: showSharedSheetUrls ? STG_SHEET_URL : null,
      categories: {
        "ウォータージャンプ": null,
        "トランポリン": null,
        "トレーニング（フィジカル）": null
      },
      plan: null
    } : null,
    mandalaApi: person.mandalaApiToken ? {
      apiUrl: MANDALA_API_URL,
      token: person.mandalaApiToken,
      sheetUrl: person.mandalaSheetUrl || null
    } : null,
    airLog: {
      apiUrl: AIRLOG_API_URL,
      appUrl: AIRLOG_APP_URL,
      matchName: person.matchName || person.name
    }
  };
}

const stepByValue = { 1: "#86b6ef", 2: "#5598e7", 3: "#2a78d6", 4: "#1c5cab", 5: "#104281" };

let current = "濵田匠真";
let mandalaDrill = null; // 現在ドリルダウン中の要素名（nullなら全体表示）
let visionExpanded = { goal: false, ultimate: false }; // 将来ビジョンの各項目が開いているか
let trainingDrill = null; // 現在ドリルダウン中の種目名（nullなら全体表示）
const trainingCache = {}; // athlete名 -> { status: 'loading'|'loaded'|'error', records, error }
let stgDrill = null; // 短期目標(フォームA)で現在ドリルダウン中のカテゴリ名（nullなら全体表示）
const stgCache = {}; // athlete名 -> { status: 'loading'|'loaded'|'error', data, error }
const seasonCache = {}; // athlete名 -> { status: 'loading'|'loaded'|'error', data, error }（将来ビジョン/シーズン目標/自己分析/生活習慣・サポート共通）
const mandalaCache = {}; // athlete名 -> { status: 'loading'|'loaded'|'error', data, error }
let airLogDrill = null; // MICエアlogで現在ドリルダウン中のカテゴリ("water"|"trampoline"、nullなら全体表示)
const airLogCache = {}; // apiUrl -> { status: 'loading'|'loaded'|'error', records, error }（全選手共通APIのためathlete名ではなくapiUrlをキーにする）

function renderSelector() {
  const el = document.getElementById("selector");
  el.innerHTML = "";
  Object.keys(ATHLETES).forEach(name => {
    const btn = document.createElement("button");
    btn.textContent = name;
    btn.className = name === current ? "active" : "";
    btn.onclick = () => {
      current = name;
      mandalaDrill = null;
      trainingDrill = null;
      stgDrill = null;
      airLogDrill = null;
      visionExpanded = { goal: false, ultimate: false };
      render();
    };
    el.appendChild(btn);
  });
}

window.toggleVision = function(key) {
  visionExpanded[key] = !visionExpanded[key];
  render();

  fetch(apiUrl + "?token=" + encodeURIComponent(token))

function epley1RM(weight, reps) {
  if (!weight || !reps) return null;
  return Math.round(weight * (1 + reps / 30) * 10) / 10;
}

// 種目ごとに { 日付: [セット, ...] } へグルーピング（セット番号順）
function groupTrainingByExercise(records) {
  const byExercise = {};
  records.forEach(r => {
    if (!byExercise[r.exercise]) byExercise[r.exercise] = {};
    if (!byExercise[r.exercise][r.date]) byExercise[r.exercise][r.date] = [];
    byExercise[r.exercise][r.date].push(r);
  });
  Object.values(byExercise).forEach(byDate => {
    Object.values(byDate).forEach(sets => sets.sort((a, b) => a.setNumber - b.setNumber));
  });
  return byExercise;
}

function latestSession(byDate) {
  const dates = Object.keys(byDate).sort().reverse();
  if (!dates.length) return null;
  return { date: dates[0], sets: byDate[dates[0]] };
}

// トレーニングログアプリと同じ進捗ロジック（引き継ぎメモ準拠）
// 全セット12回以上&平均RPE<9 → +2.5kg（デッドリフトのみ+5kg）／セット未達 or 高RPE → 同重量維持／それ以外 → 同重量で回数アップ
function nextTarget(exercise, sets) {
  const weighted = sets.filter(s => s.weight);
  if (!weighted.length) return null; // 自重種目(腹筋など)は対象外
  const topWeight = Math.max(...weighted.map(s => s.weight));
  const avgRpe = sets.reduce((sum, s) => sum + (s.rpe || 0), 0) / sets.length;
  const allTwelve = sets.every(s => s.reps >= 12);
  const anyLow = sets.some(s => s.reps < 8);
  if (allTwelve && avgRpe < 9) {
    const inc = exercise === "デッドリフト" ? 5 : 2.5;
    return { weight: topWeight + inc, note: `全セット12回以上・平均RPE${avgRpe.toFixed(1)}だったので、+${inc}kgに挑戦してみよう。` };
  } else if (anyLow || avgRpe >= 9) {
    return { weight: topWeight, note: "8回に届かない、またはきつい(RPE高め)セットがありました。同じ重量でフォームと回数の安定を優先しましょう。" };
  } else {
    return { weight: topWeight, note: "同じ重量で回数アップを狙おう。" };
  }
}

function renderSeasonPlaceholder(cbody, seasonState, seasonApi, athleteKey) {
  if (!seasonState) {
    cbody.innerHTML = `<div class="mandala-empty">まだシーズン開始シートの回答がありません。</div>`;
    return true;
  }
  if (seasonState.status === "loading") {
    cbody.innerHTML = `<div class="mandala-empty">読み込み中…</div>`;
    return true;
  }
  if (seasonState.status === "error") {
    cbody.innerHTML = `
      <div class="mandala-empty">データを取得できませんでした（${seasonState.error}）。</div>
      <div class="mandala-summary">
        <a class="mandala-link" href="javascript:void(0)" onclick="retrySeason('${athleteKey}')">再読み込み →</a>
        ${seasonApi && seasonApi.sheetUrl ? `<a class="mandala-link" href="${seasonApi.sheetUrl}" target="_blank" rel="noopener">シートを見る →</a>` : ""}
      </div>
    `;
    return true;
  }
  return false;
}

function makeShortTermGoalCard(stg, athleteKey) {
  const card = makeCard("短期目標（〜7月末）", "blue", "");
  const cbody = card.querySelector(".card-body");

  if (!stg) {
    cbody.innerHTML = `<div class="mandala-empty">短期目標フォームがまだありません。</div>`;
    return card;
  }

  // ライブ連携: apiUrlがあればフォームAの回答シートに紐づくApps Script Web Appから直接フェッチする。
  // カテゴリ/計画/更新日はキャッシュ読み込み後の値に差し替え、formUrl/sheetUrlは常に静的な値のまま。
  let categories = stg.categories;
  let plan = stg.plan;
  let updated = stg.updated;

  if (stg.apiUrl) {
    loadShortTermGoal(athleteKey, stg.apiUrl, stg.token); // 既に読み込み中/済みなら何もしない
    const cache = stgCache[athleteKey];
    if (!cache || cache.status === "loading") {

      cbody.innerHTML = `
        <div class="mandala-empty">データを取得できませんでした（${cache.error}）。</div>
        <div class="mandala-summary">
          <a class="mandala-link" href="javascript:void(0)" onclick="retryStg('${athleteKey}')">再読み込み →</a>
          <a class="mandala-link" href="${stg.formUrl}" target="_blank" rel="noopener">フォームを開く →</a>
        </div>
      `;
      return card;
    }
    categories = cache.data.categories;
    plan = cache.data.plan;
    updated = cache.data.updated;
  }

  const drillCat = stgDrill && categories[stgDrill] ? stgDrill : null;

  if (drillCat) {
    // Detail view: 選んだカテゴリの5問をすべて表示
    const c = categories[drillCat];

    cbody.appendChild(header);

    getStgFieldLabels(drillCat).forEach(([key, label]) => {
      const f = document.createElement("div");
      f.className = "field";
      f.innerHTML = `<div class="k">${label}</div><div class="v">${c[key] || "（回答なし）"}</div>`;
      cbody.appendChild(f);
    });

    const footer = document.createElement("div");
    footer.className = "mandala-summary";
    footer.innerHTML = stg.sheetUrl ? `<span></span><a class="mandala-link" href="${stg.sheetUrl}" target="_blank" rel="noopener">全回答をシートで見る →</a>` : `<span></span>`;
    cbody.appendChild(footer);
    return card;
  }

  // Overview: 3カテゴリのタイル（タップで5問に展開）+ 練習計画は常時簡易表示
  const grid = document.createElement("div");
  grid.className = "goal-grid";
  STG_CATEGORIES.forEach(cat => {
    const c = categories[cat];
    const tile = document.createElement("div");
    tile.className = "goal-tile" + (c ? " clickable" : " muted");
    if (c) {
      tile.innerHTML = `<div class="k">${cat}</div><div class="v">${getStgWantLabel(cat)} ${c.wantToDo}</div>`;
      tile.onclick = () => selectStg(cat);
    } else {
      tile.innerHTML = `<div class="k">${cat}</div><div class="v" style="color:var(--text-muted);">まだ回答がありません</div>`;
    }
    grid.appendChild(tile);
  });
  cbody.appendChild(grid);

  const planTitle = document.createElement("div");
  planTitle.style.cssText = "font-size:11px;color:var(--text-muted);font-weight:700;margin:12px 0 6px;";
  planTitle.textContent = "練習計画";
  cbody.appendChild(planTitle);

  if (plan) {
    const p = plan;
    const planGrid = document.createElement("div");
    planGrid.className = "goal-grid";
    planGrid.innerHTML = `
      <div class="goal-tile"><div class="k">練習頻度・時間</div><div class="v">${p.frequency}</div></div>

      f.innerHTML = `
        ${p.wish ? `<div class="k">モーグルの楽しさを広めたいこと</div><div class="v">${p.wish}</div>` : ""}

      `;
      cbody.appendChild(f);
    }
  } else {
    const empty = document.createElement("div");
    empty.className = "mandala-empty";
    empty.style.paddingTop = "0";
    empty.textContent = "まだ回答がありません。";
    cbody.appendChild(empty);
  }

  const footer = document.createElement("div");
  footer.className = "mandala-summary";
  footer.innerHTML = `
    <span>${updated ? "更新日 " + updated : "まだ回答がありません"}</span>
    <span>

    </span>
  `;
  cbody.appendChild(footer);

  return card;
}

        <a class="mandala-link" href="${a.training.appUrl}" target="_blank" rel="noopener">アプリを開く →</a>
      </div>
    `;
    return card;
  }

  const byExercise = groupTrainingByExercise(cache.records);

  if (trainingDrill && byExercise[trainingDrill]) {
    // Detail view: 選んだ種目の直近セッション履歴 + 次回の目標
    const byDate = byExercise[trainingDrill];
    const dates = Object.keys(byDate).sort().reverse().slice(0, 3); // 直近3セッション

    const header = document.createElement("div");
    header.className = "mandala-summary";
    header.style.marginTop = "0";
    header.style.marginBottom = "8px";
    header.innerHTML = `<a class="mandala-link" href="javascript:void(0)" onclick="trainingBack()">← 全体に戻る</a><span>${trainingDrill}</span>`;
    cbody.appendChild(header);

    dates.forEach(date => {
      // 同じ日に複数のサブ種目(note違い、例:腹筋のアブローラー/オリジナル腹筋)が混在する場合は分けて表示
      const groups = [];
      const groupIndex = {};
      byDate[date].forEach(s => {
        const key = s.note || "";
        if (!(key in groupIndex)) { groupIndex[key] = groups.length; groups.push({ note: key, sets: [] }); }
        groups[groupIndex[key]].sets.push(s);
      });
      groups.forEach(g => {
        const setsText = g.sets.map(s => {
          const w = s.weight ? `${s.weight}kg×` : "";
          return `${w}${s.reps}回(RPE${s.rpe ?? "-"})`;
        }).join(" / ");
        const topEpley = Math.max(0, ...g.sets.filter(s => s.weight).map(s => epley1RM(s.weight, s.reps) || 0));
        const f = document.createElement("div");
        f.className = "field";
        f.innerHTML = `
          <div class="k">${date}${g.note ? "・" + g.note : ""}</div>
          <div class="v">${setsText}${topEpley > 0 ? `<br><span style="color:var(--text-muted);font-size:11.5px;">推定1RM ${topEpley}kg</span>` : ""}</div>
        `;
        cbody.appendChild(f);
      });
    });

    const nt = nextTarget(trainingDrill, byDate[dates[0]]);
    if (nt) {
      const box = document.createElement("div");
      box.className = "message-box";
      box.innerHTML = `<div class="k">次回の目標</div>${nt.weight}kg × 8〜12回 × 3セット<br><span style="font-weight:400;">${nt.note}</span>`;
      cbody.appendChild(box);
    }

    const footer = document.createElement("div");
    footer.className = "mandala-summary";
    footer.innerHTML = `<span></span><a class="mandala-link" href="${a.training.appUrl}" target="_blank" rel="noopener">アプリで全履歴・グラフを見る →</a>`;
    cbody.appendChild(footer);
    return card;
  }

  // Overview: 種目ごとのタイル（タップで直近セッション履歴にドリルダウン）
  const grid = document.createElement("div");
  grid.className = "goal-grid";
  MAIN_EXERCISES.forEach(ex => {
    const byDate = byExercise[ex];
    const latest = byDate ? latestSession(byDate) : null;
    const tile = document.createElement("div");
    tile.className = "goal-tile clickable" + (latest ? "" : " muted");
    if (!latest) { tile.className = tile.className.replace(" clickable", ""); }
    if (latest) {
      const topSet = latest.sets.reduce((max, s) => (s.weight || 0) > (max.weight || 0) ? s : max, latest.sets[0]);
      const epley = epley1RM(topSet.weight, topSet.reps);
      const valueText = topSet.weight
        ? `${latest.date}・推定1RM ${epley}kg`
        : `${latest.date}・${latest.sets.reduce((sum, s) => sum + s.reps, 0)}回`;
      tile.innerHTML = `<div class="k">${ex}</div><div class="v">${valueText}</div>`;
      tile.onclick = () => selectTraining(ex);
    } else {
      tile.innerHTML = `<div class="k">${ex}</div><div class="v" style="color:var(--text-muted);">まだ記録なし</div>`;
    }
    grid.appendChild(tile);
  });
  cbody.appendChild(grid);

  const footer = document.createElement("div");
  footer.className = "mandala-summary";
  footer.innerHTML = `<span></span><a class="mandala-link" href="${a.training.appUrl}" target="_blank" rel="noopener">アプリを開く →</a>`;
  cbody.appendChild(footer);
  const hint = document.createElement("div");
  hint.style.cssText = "font-size:10.5px;color:var(--text-muted);margin-top:4px;text-align:center;";
  hint.textContent = "記録のある種目をタップすると、直近の履歴を見られます";
  cbody.appendChild(hint);

  return card;
}

// MICエアlog(ウォータージャンプ・トランポリン記録アプリ)関連ヘルパー
const AIR_LOG_CATEGORIES = [
  ["water", "ウォータージャンプ"],
  ["trampoline", "トランポリン"]
];

// MICエアlogの実APIは「セッション(record)ごとに複数の技行(rows)を入れ子で持つ」構造。
// record: {athleteName, category, date, facility, kicker, note, rows:[...]}
// row: {trickId, modifier, nuki, unnatural, success(本数), fail(本数), kakari, airtimeSeconds}
// success/failは本数(数値)。特殊技 "airtime"(10本ジャンプ)はsuccess/failを持たずairtimeSecondsのみ。
// 技名はMICエアlogアプリ本体のカタログと同じ表記に揃える。
const AIRLOG_TRICK_LABELS = {
  straight_jump: "ストレートジャンプ",
  rot_3: "360", rot_7: "720", rot_10: "1080",
  oax_3: "オフアクシス360", oax_7: "オフアクシス720", oax_10: "オフアクシス1080", oax_14: "オフアクシス1440",
  inv_bt: "バックタック", inv_bp: "バックパイク", inv_bl: "バックレイアウト",
  inv_bf: "バックフル", inv_bdf: "バックダブルフル", inv_btf: "バックトリプルフル",
  inv_ft: "フロントタック", inv_fp: "フロントパイク", inv_ff: "フロントフル",
  loop_l: "ループ", airtime: "10本ジャンプ",
  inv_bpt: "バックタック/パイク", inv_fpt: "フロントタック/パイク"
};
const AIRLOG_MODIFIER_LABELS = { none: "", position: "ポジション", G: "G", g: "g" };

function airLogIsAirtime(row) { return row && row.trickId === "airtime"; }

function airLogTrickName(row) {
  if (!row) return "(技名未記入)";
  let name = AIRLOG_TRICK_LABELS[row.trickId] || row.trickId || "(技名未記入)";
  const mod = AIRLOG_MODIFIER_LABELS[row.modifier];
  if (mod) name += " " + mod;
  if (row.nuki) name += "・抜き";
  if (row.unnatural) name += "・アンナチュラル";
  return name;
}

// 1行の本数を返す。ウォータージャンプはsuccess/fail(成功/失敗本数)、
// トランポリンはreps(本数、成功/失敗の区別なし)。airtime(10本ジャンプ)は別扱いなのでここには来ない。
function airLogHon(row) {
  const hasSF = (row.success != null || row.fail != null);
  if (hasSF) {
    const s = Number(row.success) || 0, f = Number(row.fail) || 0;
    return { hon: s + f, success: s, hasSuccess: true };
  }
  return { hon: Number(row.reps) || 0, success: 0, hasSuccess: false };
}

function groupAirLogByCategory(records, matchName) {
  const target = (matchName || "").trim();
  const mine = (records || []).filter(r => (r.athleteName || "").trim() === target);
  const byCat = { water: [], trampoline: [] };
  mine.forEach(r => {
    if (byCat[r.category]) byCat[r.category].push(r);
  });
  return byCat;
}

// カテゴリ内の全セッション(records)から、通常技の本数(success+fail)・成功数、最新日、
// 10本ジャンプ(airtime)の最新滞空秒を集計する。
function airLogCatStats(records) {
  let success = 0, total = 0, latestDate = "", latestAirtime = null, airtimeDate = "";
  let hasSuccess = false, kakari = 0;
  (records || []).forEach(rec => {
    if (rec.date && rec.date > latestDate) latestDate = rec.date;
    (rec.rows || []).forEach(row => {
      if (airLogIsAirtime(row)) {
        const sec = parseFloat(row.airtimeSeconds);
        if (!isNaN(sec) && (rec.date || "") >= airtimeDate) { latestAirtime = sec; airtimeDate = rec.date || ""; }
        return;
      }
      const c = airLogHon(row);
      total += c.hon;
      if (c.hasSuccess) { success += c.success; hasSuccess = true; }
      if (row.kakari) kakari += c.hon; // かかり本数(かかりONの行の本数合計)
    });
  });
  return { success, total, latestDate, latestAirtime, hasSuccess, kakari };
}

// ドリルダウン用: セッション(record)を新しい順に、技名→{success,total本}・10本ジャンプ秒・メモにまとめる。
function airLogSessionsStats(records) {
  const sessions = (records || []).slice().sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  return sessions.map(rec => {
    const tricks = {};
    let airtimeSec = null;
    (rec.rows || []).forEach(row => {
      if (airLogIsAirtime(row)) {
        const sec = parseFloat(row.airtimeSeconds);
        if (!isNaN(sec)) airtimeSec = sec;
        return;
      }
      const name = airLogTrickName(row);
      if (!tricks[name]) tricks[name] = { success: 0, total: 0, hasSuccess: false, kakari: 0 };
      const c = airLogHon(row);
      tricks[name].total += c.hon;
      if (c.hasSuccess) { tricks[name].success += c.success; tricks[name].hasSuccess = true; }
      if (row.kakari) tricks[name].kakari += c.hon;
    });
    const notes = rec.note ? [rec.note] : [];
    return { date: rec.date || "", facility: rec.facility || "", tricks, airtimeSec, notes };
  });
}

// 短期目標(フォームA)の「挑戦したい技」をMICエアlogカードに表示するためのヘルパー。
// stgCacheが未読み込み(loading)・エラー・短期目標フォーム自体が無い場合はnullを返し、
// その場合エアlog側は「挑戦したい技」の表示を省略する(エアlogカード自体の表示はブロックしない)。
function getStgCategoriesForAirLog(a, athleteKey) {
  const stg = a.shortTermGoal;
  if (!stg) return null;
  if (stg.apiUrl) {
    const cache = stgCache[athleteKey];
    if (cache && cache.status === "loaded") return cache.data.categories;
    return null;
  }
  return stg.categories || null;
}

function makeAirLogCard(a, athleteKey) {
  const card = makeCard("MICエアlog", "blue", "");
  const cbody = card.querySelector(".card-body");
  const airLog = a.airLog;
  if (!airLog || !airLog.apiUrl) {
    cbody.innerHTML = `<div class="mandala-empty">MICエアlogは未連携です</div>`;
    return card;
  }

  const stgCategories = getStgCategoriesForAirLog(a, athleteKey);
  loadAirLog(airLog.apiUrl);
  const cache = airLogCache[airLog.apiUrl];

  if (!cache || cache.status === "loading") {
    cbody.innerHTML = `<div class="mandala-empty">読み込み中...</div>`;
    return card;
  }
  if (cache.status === "error") {
    cbody.innerHTML = "";
    const summary = document.createElement("div");
    summary.className = "mandala-summary";
    summary.innerHTML = `<span>読み込みに失敗しました</span><a class="mandala-link" href="javascript:void(0)" onclick="window.retryAirLog('${airLog.apiUrl}')">再読み込み →</a>`;
    cbody.appendChild(summary);
    const footer = document.createElement("div");
    footer.className = "mandala-summary";
    footer.innerHTML = `<span></span><a class="mandala-link" href="${airLog.appUrl}" target="_blank" rel="noopener">アプリを開く →</a>`;
    cbody.appendChild(footer);
    return card;
  }

  const byCat = groupAirLogByCategory(cache.records, airLog.matchName);

  if (airLogDrill && (airLogDrill === "water" || airLogDrill === "trampoline")) {
    const catLabel = AIR_LOG_CATEGORIES.find(c => c[0] === airLogDrill)[1];
    const rows = byCat[airLogDrill];
    const back = document.createElement("div");
    back.style.cssText = "margin-bottom:8px;";
    back.innerHTML = `<a class="mandala-link" href="javascript:void(0)" onclick="window.airLogBack()">← 全体に戻る</a>`;
    cbody.appendChild(back);

    const drillStgCat = stgCategories && stgCategories[catLabel];
    if (drillStgCat && drillStgCat.wantToDo) {
      const wantBox = document.createElement("div");
      wantBox.className = "field sub";
      wantBox.innerHTML = `<div class="k">挑戦したい技(短期目標より)</div><div class="v">${drillStgCat.wantToDo}</div>`;
      cbody.appendChild(wantBox);
    }

    if (!rows.length) {
      cbody.innerHTML += `<div class="mandala-empty">${catLabel}の記録はまだありません</div>`;
    } else {
      const sessions = airLogSessionsStats(rows).slice(0, 5);
      sessions.forEach(s => {
        const sess = document.createElement("div");
        sess.className = "field";
        const parts = Object.keys(s.tricks).map(t => {
          const ts = s.tricks[t];
          let str = ts.hasSuccess ? `${t}: ${ts.success}/${ts.total}本` : `${t}: ${ts.total}本`;
          if (ts.kakari > 0) str += `(かかり${ts.kakari}/${ts.total})`;
          return str;
        });
        if (s.airtimeSec != null) parts.push(`10本ジャンプ: ${s.airtimeSec}秒`);
        const trickLines = parts.length ? parts.join("<br>") : "(記録内容なし)";
        const noteLine = s.notes.length ? `<div style="margin-top:4px;color:var(--text-muted);font-size:11px;">${s.notes.join(" / ")}</div>` : "";
        sess.innerHTML = `<div class="k">${s.date}${s.facility ? " ・ " + s.facility : ""}</div><div class="v">${trickLines}${noteLine}</div>`;
        cbody.appendChild(sess);
      });
    }

    const footer = document.createElement("div");
    footer.className = "mandala-summary";
    footer.innerHTML = `<span></span><a class="mandala-link" href="${airLog.appUrl}" target="_blank" rel="noopener">アプリで全履歴を見る →</a>`;
    cbody.appendChild(footer);
    return card;
  }

  const grid = document.createElement("div");
  grid.className = "goal-grid";
  AIR_LOG_CATEGORIES.forEach(([key, label]) => {
    const rows = byCat[key];
    const tile = document.createElement("div");
    const tileStgCat = stgCategories && stgCategories[label];
    const wantHtml = tileStgCat && tileStgCat.wantToDo
      ? `<div style="font-size:10.5px;color:var(--blue-450);font-weight:700;margin-bottom:3px;">挑戦したい技: ${tileStgCat.wantToDo}</div>`
      : "";
    if (rows.length) {
      const stats = airLogCatStats(rows);
      const lines = [`最新: ${stats.latestDate || "-"}`];
      if (stats.hasSuccess) lines.push(`成功 ${stats.success}/${stats.total}本`);
      else if (stats.total > 0) lines.push(`本数 ${stats.total}本`);
      if (stats.latestAirtime != null) lines.push(`10本ジャンプ 最新${stats.latestAirtime}秒`);
      if (stats.kakari > 0) lines.push(`かかり ${stats.kakari}/${stats.total}本`);
      tile.className = "goal-tile clickable";
      tile.onclick = () => window.selectAirLogCategory(key);
      tile.innerHTML = `<div class="k">${label}</div>${wantHtml}<div class="v">${lines.join("<br>")}</div>`;
    } else {
      tile.className = "goal-tile muted";
      tile.innerHTML = `<div class="k">${label}</div>${wantHtml}<div class="v" style="color:var(--text-muted);">まだ記録なし</div>`;
    }
    grid.appendChild(tile);
  });
  cbody.appendChild(grid);

  const footer = document.createElement("div");
  footer.className = "mandala-summary";
  footer.innerHTML = `<span></span><a class="mandala-link" href="${airLog.appUrl}" target="_blank" rel="noopener">アプリを開く →</a>`;
  cbody.appendChild(footer);

  return card;
}

function escHtml(str) {
  return String(str == null ? "" : str).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

// linkedEntryId/linkedRowIdから、元になった技行(トリック・本数など)をrecordsの中から探す。
function airLogFindRecordRow(records, entryId, rowId) {
  if (!entryId || !rowId) return null;
  const rec = (records || []).find(function (r) { return r.id === entryId; });
  if (!rec) return null;
  const row = (rec.rows || []).find(function (rw) { return rw.rowId === rowId; });
  if (!row) return null;
  return { rec: rec, row: row };
}

// entryId+rowIdに紐づく動画(success/fail/singleいずれの種別も)をすべて集める。リンクのみ表示(サムネイルなし)。
function airLogVideosForRow(videos, entryId, rowId) {
  if (!entryId || !rowId) return [];
  const typeLabel = { success: "成功", fail: "失敗", single: "動画" };
  return (videos || []).filter(function (v) { return v.entryId === entryId && v.rowId === rowId; })
    .map(function (v, i) { return { url: v.sharedUrl, label: (typeLabel[v.type] || "動画") + (i > 0 ? (i + 1) : "") }; });
}

// コーチへ共有カード。MICエアlogのダッシュボードから選手が共有した技行ごとに、
// 動画リンク・今日のベストバッジ・選手⇔コーチのチャット形式のやりとりをスレッド表示する。
// スレッドに紐づかない伝言(linkedRowIdなし)は末尾に別枠でまとめて表示する。
function makeCoachNotesCard(a, athleteKey) {
  const card = makeCard("コーチへ共有", "gold", "");
  const cbody = card.querySelector(".card-body");
  const airLog = a.airLog;
  if (!airLog || !airLog.apiUrl) {
    cbody.innerHTML = '<div class="mandala-empty">MICエアlogは未連携です</div>';
    return card;
  }
  loadAirLog(airLog.apiUrl);
  const cache = airLogCache[airLog.apiUrl];
  if (!cache || cache.status === "loading") {
    cbody.innerHTML = '<div class="mandala-empty">読み込み中...</div>';
    return card;
  }
  if (cache.status === "error") {
    cbody.innerHTML = '<div class="mandala-empty">読み込みに失敗しました</div>';
    return card;
  }
  const athleteRec = (cache.athletes || []).find(function (x) { return x.name === airLog.matchName; });
  const athleteId = athleteRec ? athleteRec.id : "";
  const notes = (cache.coachNotes || []).filter(function (n) { return athleteId && n.athleteId === athleteId; });

  // linkedEntryId+linkedRowId単位でスレッド化。両方空のものは「その他の伝言」スレッドにまとめる。
  const threadOrder = [];
  const threadMap = {};
  notes.forEach(function (n) {
    const key = (n.linkedEntryId || "") + "|" + (n.linkedRowId || "");
    if (!threadMap[key]) { threadMap[key] = { entryId: n.linkedEntryId || "", rowId: n.linkedRowId || "", items: [] }; threadOrder.push(key); }
    threadMap[key].items.push(n);
  });
  threadOrder.forEach(function (key) {
    threadMap[key].items.sort(function (x, y) {
      const ca = x.createdAt || "", cb = y.createdAt || "";
      if (ca < cb) return -1;
      if (ca > cb) return 1;
      return 0;
    });
  });
  // スレッドは最新メッセージが新しい順。「その他の伝言」(rowId無し)は末尾固定。
  threadOrder.sort(function (k1, k2) {
    const t1 = threadMap[k1], t2 = threadMap[k2];
    if (!t1.rowId && t2.rowId) return 1;
    if (t1.rowId && !t2.rowId) return -1;
    const last1 = t1.items[t1.items.length - 1].createdAt || "";
    const last2 = t2.items[t2.items.length - 1].createdAt || "";
    if (last1 < last2) return 1;
    if (last1 > last2) return -1;
    return 0;
  });

  let bodyHtml = "";
  if (!threadOrder.length) {
    bodyHtml = '<div class="mandala-empty">共有メモはまだありません</div>';
  } else {
    bodyHtml = threadOrder.map(function (key, ti) {
      const t = threadMap[key];
      const isGeneral = !t.rowId;
      const found = !isGeneral ? airLogFindRecordRow(cache.records, t.entryId, t.rowId) : null;
      const bestNote = t.items.find(function (n) { return n.isBestOfDay; });
      let headerHtml, subHtml = "", videoLinksHtml = "";
      if (isGeneral) {
        headerHtml = '<div class="coachnote-general-heading">その他の伝言</div>';
      } else {
        const trickLabel = found ? escHtml(airLogTrickName(found.row)) : "(記録が見つかりません)";
        const honInfo = found ? airLogHon(found.row) : null;
        const honLabel = honInfo ? (honInfo.hasSuccess ? (honInfo.success + "/" + honInfo.hon + "本") : (honInfo.hon + "本")) : "";
        headerHtml = '<div class="coachnote-thread-header">' + trickLabel + (bestNote ? '<span class="coachnote-best-badge">★ 今日のベスト</span>' : '') + '</div>';
        subHtml = '<div class="coachnote-thread-sub">' + (found ? escHtml(found.rec.date || "") + (honLabel ? " ・ " + honLabel : "") : "") + '</div>';
        const vids = airLogVideosForRow(cache.videos, t.entryId, t.rowId);
        if (vids.length) {
          videoLinksHtml = '<div class="coachnote-video-links">' + vids.map(function (v) {
            return '<a class="coachnote-video-link" href="' + escHtml(v.url) + '" target="_blank" rel="noopener noreferrer">▶ ' + escHtml(v.label) + 'を見る</a>';
          }).join("") + '</div>';
        }
      }
      const bubblesHtml = '<div class="coachnote-bubbles">' + t.items.map(function (n) {
        const isCoach = n.source === "coach";
        const who = isCoach ? "コーチ" : "選手";
        const text = n.text ? escHtml(n.text) : '<em>(コメントなし)</em>';
        return '<div class="coachnote-bubble ' + (isCoach ? "coach" : "athlete") + '"><div class="who">' + escHtml(who) + ' ・ ' + escHtml(n.createdAt || "") + '</div><div class="txt">' + text + '</div></div>';
      }).join("") + '</div>';
      const threadKey = athleteKey + "_" + ti;
      const replyHtml = '<div class="coachnote-reply-row">' +
        '<textarea class="coachnote-reply-input" id="coachReplyInput_' + threadKey + '" rows="1" placeholder="返信する"></textarea>' +
        '<button class="coachnote-reply-btn" id="coachReplyBtn_' + threadKey + '" onclick="submitCoachReply(\'' + athleteKey + "','" + athleteId + "','" + escAttrJs(t.entryId) + "','" + escAttrJs(t.rowId) + "','" + threadKey + '\')">送信</button>' +
        '</div><div class="coachnote-status" id="coachReplyStatus_' + threadKey + '"></div>';
      return '<div class="coachnote-thread">' + headerHtml + subHtml + videoLinksHtml + bubblesHtml + replyHtml + '</div>';
    }).join("");
  }

  cbody.innerHTML = bodyHtml +
    '<div class="coachnote-general-heading">新しい伝言を送る</div>' +
    '<textarea class="coachnote-input" id="coachNoteInput_' + athleteKey + '" rows="2" placeholder="特定の技に紐づかない伝言はこちらから"></textarea>' +
    '<button class="coachnote-btn" onclick="submitCoachNote(\'' + athleteKey + "','" + athleteId + '\')">送信する</button>' +
    '<div class="coachnote-status" id="coachNoteStatus_' + athleteKey + '"></div>';

  if (!athleteId) {
    const btn = cbody.querySelector(".coachnote-btn");
    if (btn) btn.disabled = true;
  }

  return card;
}

// onclick文字列に安全に埋め込むための簡易エスケープ(シングルクォート/バックスラッシュのみ)。
function escAttrJs(str) {
  return String(str == null ? "" : str).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}

function submitCoachNote(athleteKey, athleteId) {
  if (!athleteId) return;
  const a = ATHLETES[athleteKey];
  const apiUrl = a && a.airLog && a.airLog.apiUrl;
  if (!apiUrl) return;
  const input = document.getElementById("coachNoteInput_" + athleteKey);
  const statusEl = document.getElementById("coachNoteStatus_" + athleteKey);
  const text = (input && input.value ? input.value : "").trim();
  if (!text) return;
  if (statusEl) statusEl.textContent = "送信中...";
  const source = VIEW_MODE === "player" ? "athlete" : "coach";
  fetch(apiUrl, { method: "POST", body: JSON.stringify({ type: "addCoachNote", athleteId: athleteId, source: source, kind: "share", text: text }) })
    .then(function (res) { return res.json(); })
    .then(function (result) {
      if (result.status !== "ok") throw new Error(result.message || "failed");
      delete airLogCache[apiUrl];
      render();
    })
    .catch(function () {
      if (statusEl) statusEl.textContent = "送信に失敗しました。もう一度お試しください。";
    });
}

// 技行スレッドへの返信。選手専用モード(自分のカルテ)なら選手として、コーチ用モードならコーチとして送信する。
function submitCoachReply(athleteKey, athleteId, linkedEntryId, linkedRowId, threadKey) {
  if (!athleteId) return;
  const a = ATHLETES[athleteKey];
  const apiUrl = a && a.airLog && a.airLog.apiUrl;
  if (!apiUrl) return;
  const input = document.getElementById("coachReplyInput_" + threadKey);
  const statusEl = document.getElementById("coachReplyStatus_" + threadKey);
  const btn = document.getElementById("coachReplyBtn_" + threadKey);
  const text = (input && input.value ? input.value : "").trim();
  if (!text) return;
  if (btn) btn.disabled = true;
  if (statusEl) statusEl.textContent = "送信中...";
  const source = VIEW_MODE === "player" ? "athlete" : "coach";
  fetch(apiUrl, {
    method: "POST",
    body: JSON.stringify({ type: "addCoachNote", athleteId: athleteId, source: source, kind: "reply", text: text, linkedEntryId: linkedEntryId || "", linkedRowId: linkedRowId || "" }),
  })
    .then(function (res) { return res.json(); })
    .then(function (result) {
      if (result.status !== "ok") throw new Error(result.message || "failed");
      delete airLogCache[apiUrl];
      render();
    })
    .catch(function () {
      if (btn) btn.disabled = false;
      if (statusEl) statusEl.textContent = "送信に失敗しました。もう一度お試しください。";
    });
}

function makeVisionCard(a, seasonState, athleteKey) {
  const card = makeCard("将来ビジョン", "gold", "");
  const cbody = card.querySelector(".card-body");

  if (renderSeasonPlaceholder(cbody, seasonState, a.seasonApi, athleteKey)) return card;

  const v = seasonState.data.vision;

  if (!v) {
    cbody.innerHTML = `<div class="mandala-empty">まだシーズン開始シートの回答がありません。</div>`;
    return card;
  }

  // Item 1: 3〜5年後の目標 → タップで「その理由」
  const goalOpen = visionExpanded.goal;
  const goalField = document.createElement("div");
  goalField.className = "field clickable";
  goalField.innerHTML = `
    <div class="k">3〜5年後の目標 <span class="chev">${goalOpen ? '▾' : '▸'}</span></div>
    <div class="v">${v.goal}</div>
  `;
  goalField.onclick = () => toggleVision('goal');
  cbody.appendChild(goalField);
  if (goalOpen) {
    const sub = document.createElement("div");
    sub.className = "field sub";
    sub.innerHTML = `<div class="k">その理由</div><div class="v">${v.reason}</div>`;
    cbody.appendChild(sub);
  }

  // Item 2: 競技人生の最終到達点 → タップで M/N/O(必要なこと・自分の気持ち・周りの気持ち)
  const ultOpen = visionExpanded.ultimate;
  const ultField = document.createElement("div");
  ultField.className = "field clickable";
  ultField.innerHTML = `
    <div class="k">競技人生の最終到達点 <span class="chev">${ultOpen ? '▾' : '▸'}</span></div>
    <div class="v">${v.ultimate}</div>
  `;
  ultField.onclick = () => toggleVision('ultimate');
  cbody.appendChild(ultField);
  if (ultOpen) {
    const sub = document.createElement("div");
    sub.className = "field sub";
    sub.innerHTML = `
      <div class="k">目標達成のために必要なこと</div><div class="v">${v.needed}</div>
      <div class="k" style="margin-top:8px;">達成できたとき、自分はどんな気持ちか</div><div class="v">${v.selfFeeling}</div>
      <div class="k" style="margin-top:8px;">達成したとき、周りはどんな気持ちか</div><div class="v">${v.othersFeeling}</div>
    `;
    cbody.appendChild(sub);
  }

  // Item 3: 大会使用予定技（今シーズン/来シーズン、1エア・2エア）
  const hasTrick = v.seasonAir1 || v.seasonAir2 || v.nextSeasonAir1 || v.nextSeasonAir2;
  if (hasTrick) {
    const trickField = document.createElement("div");
    trickField.className = "field";
    trickField.innerHTML = `
      <div class="k">大会使用予定技</div>
      <div class="v" style="margin-bottom:6px;"><span style="color:var(--text-muted);">今シーズン：</span>1エア ${v.seasonAir1 || "―"}　2エア ${v.seasonAir2 || "―"}</div>
      <div class="v"><span style="color:var(--text-muted);">来シーズン：</span>1エア ${v.nextSeasonAir1 || "―"}　2エア ${v.nextSeasonAir2 || "―"}</div>
    `;
    cbody.appendChild(trickField);
  }

  return card;
}

function countDone(actions) {
  return actions ? actions.filter(Boolean).length : 0;
}

// Google スプレッドシートが無く紙(写真)だけのケースもあるので、sheetUrlが無ければ
// リンクの代わりに一言メモ(photoNote)を出す。両方無ければリンクは出さない。
function mandalaSourceLink(m, label) {
  if (m && m.sheetUrl) {
    return `<a class="mandala-link" href="${m.sheetUrl}" target="_blank" rel="noopener">${label} →</a>`;
  }
  if (m && m.photoNote) {
    return `<span style="color:var(--text-muted); font-weight:400; font-size:11.5px;">${m.photoNote}</span>`;
  }
  return "";
}

function makeMandalaCard(m, mandalaState, mandalaApi, athleteKey) {
  const card = makeCard("マンダラチャート（目標達成シート）", "gold", "");
  const cbody = card.querySelector(".card-body");

  if (mandalaState && mandalaState.status === "loading") {
    cbody.innerHTML = `<div class="mandala-empty">読み込み中…</div>`;
    return card;
  }
  if (mandalaState && mandalaState.status === "error") {
    cbody.innerHTML = `
      <div class="mandala-empty">データを取得できませんでした（${mandalaState.error}）。</div>
      <div class="mandala-summary">
        <a class="mandala-link" href="javascript:void(0)" onclick="retryMandala('${athleteKey}')">再読み込み →</a>
        ${mandalaSourceLink(mandalaApi, "シートを開く")}
      </div>
    `;
    return card;
  }

  if (!m || !m.goal) {
    cbody.innerHTML = `
      <div class="mandala-empty">まだ着手前です。「マンダラチャート(記入用)」シートの中心マス(目標)から書き始めてもらいましょう。</div>
      <div class="mandala-summary">
        <span></span>
        ${mandalaSourceLink(mandalaApi, "シートを開く")}
      </div>
    `;
    return card;
  }

  const drillCell = mandalaDrill ? m.grid.find(c => c && c.name === mandalaDrill) : null;

  if (drillCell) {
    // Detail view: drillCell.name を中心に、その8マスの具体的な行動を表示
    const header = document.createElement("div");
    header.className = "mandala-summary";
    header.style.marginTop = "0";
    header.style.marginBottom = "8px";
    header.innerHTML = `
      <a class="mandala-link" href="javascript:void(0)" onclick="mandalaBack()">← 全体に戻る</a>
      <span>${countDone(drillCell.actions)}/8 記入済み</span>
    `;
    cbody.appendChild(header);

    const actions = drillCell.actions || new Array(8).fill(null);
    // actions の並び: [左上,上,右上,左,右,左下,下,右下]
    const cells9 = [
      actions[0], actions[1], actions[2],
      actions[3], "__CENTER__", actions[4],
      actions[5], actions[6], actions[7]
    ];
    const grid = document.createElement("div");
    grid.className = "mandala-3x3";
    cells9.forEach(v => {
      if (v === "__CENTER__") {
        grid.innerHTML += `<div class="mandala-cell center sub"><div class="g">${drillCell.name}</div></div>`;
      } else if (v) {
        grid.innerHTML += `<div class="mandala-cell action filled"><div class="a">${v}</div></div>`;
      } else {
        grid.innerHTML += `<div class="mandala-cell action"><div class="a muted">（未記入）</div></div>`;
      }
    });
    cbody.appendChild(grid);

    const footer = document.createElement("div");
    footer.className = "mandala-summary";
    footer.innerHTML = `
      <span></span>
      ${mandalaSourceLink(mandalaApi, "シートで編集する")}
    `;
    cbody.appendChild(footer);
    return card;
  }

  // Overview: 中心目標 + 8要素（タップで各要素の8マスにドリルダウン）
  const grid = document.createElement("div");
  grid.className = "mandala-3x3";
  let doneTotal = 0, cellTotal = 0;
  m.grid.forEach(cell => {
    if (cell === null) {
      grid.innerHTML += `<div class="mandala-cell center"><div class="g">${m.goal}</div></div>`;
      return;
    }
    const done = countDone(cell.actions);
    doneTotal += done;
    cellTotal += 8;
    const started = done > 0;
    grid.innerHTML += `
      <div class="mandala-cell elem clickable ${started ? 'started' : ''}" onclick="selectMandalaElement('${cell.name}')">
        <div class="n">${cell.name}</div>
        <div class="p">${done}/8${started ? '' : '・未着手'}</div>
      </div>
    `;
  });
  cbody.appendChild(grid);

  const summary = document.createElement("div");
  summary.className = "mandala-summary";
  summary.innerHTML = `
    <span>行動レベル ${doneTotal}/${cellTotal}マス記入済み・更新日 ${m.updated}</span>
    ${mandalaSourceLink(mandalaApi, "全81マスを見る")}
  `;
  cbody.appendChild(summary);
  const hint = document.createElement("div");
  hint.style.cssText = "font-size:10.5px;color:var(--text-muted);margin-top:4px;text-align:center;";
  hint.textContent = "各要素をタップすると、その8マスの内容を見られます";
  cbody.appendChild(hint);

  return card;
}

function makeCard(title, tone, innerHTML) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-head ${tone}"><span class="dot"></span><h2>${title}</h2></div>
    <div class="card-body">${innerHTML}</div>
  `;
  return card;
}

// トークン解決に失敗した場合(無効なリンク)や、リゾルバ自体への通信が失敗した場合に
// 選手切り替えタブ・更新日表示を隠し、appBodyにエラーメッセージのみを表示する。
function renderFatalError(message) {
  document.getElementById("selector").style.display = "none";
  document.getElementById("updatedRow").textContent = "";
  document.getElementById("appBody").innerHTML =
    `<div class="card"><div class="card-body"><div class="mandala-empty">${message}</div></div></div>`;
}

// 起動処理。URLの?token=の有無で「選手専用モード」か「コーチ用(全選手)モード」かを判定し、
// 名簿リゾルバAPIから実データを取得してATHLETESを組み立ててから初回render()を呼ぶ。
async function initApp() {
  const urlToken = new URLSearchParams(location.search).get("token");
  let singlePerson = null;

  try {
    if (urlToken) {
      const res = await fetch(RESOLVER_URL + "?token=" + encodeURIComponent(urlToken));
      const data = await res.json();
      if (data.error) {
        renderFatalError("このリンクは無効です。お手数ですが担当コーチにご確認ください。");
        return;
      }
      if (data.type === "athlete") {
        singlePerson = data;
      }
      // data.type === "coach" の場合は下の「全選手取得」にそのままフォールスルーする
    }
    VIEW_MODE = singlePerson ? "player" : "coach";

    if (singlePerson) {
      ATHLETES = { [singlePerson.name]: buildAthleteEntry(singlePerson, false) };
      current = singlePerson.name;
      document.getElementById("selector").style.display = "none";
      document.getElementById("draftBanner").textContent =
        "このページは" + singlePerson.name + "選手専用です。マンダラチャート・短期目標・シーズン目標などはスプレッドシート/フォームの回答からライブに反映されます。";
    } else {
      const res = await fetch(RESOLVER_URL + "?list=athletes");
      const data = await res.json();
      if (!data.athletes || !data.athletes.length) {
        renderFatalError("選手データを取得できませんでした。しばらくしてから再度お試しください。");
        return;
      }
      const built = {};
      data.athletes.forEach(p => { built[p.name] = buildAthleteEntry(p, true); });
      ATHLETES = built;
      if (!ATHLETES[current]) current = Object.keys(ATHLETES)[0];
    }
    render();
  } catch (err) {
    renderFatalError("データの取得に失敗しました。時間をおいて再度お試しください（" + err + "）。");
  }
}

initApp();
</script>
